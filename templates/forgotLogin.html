{{ define "title"}}Forgot{{end}}
{{ define "content" }}

<div>
  <p>Enter email address below</p>
  <form id="forgot" method="post" action="/forgotLoginSubmit">
    <div class="form-element">
      <label for="email">Email</label>
      <input type="email" id="email" name="email">
    </div>
    <button type="submit">Submit</button>
  </form>
</div>
<div class="warning hidden" id="forgot-submit">
  <p class="warning">If an account exists, an email was sent providing username and temp password.</p>
</div>

{{ end }}
